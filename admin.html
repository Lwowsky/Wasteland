<!DOCTYPE html>
<html lang="uk" translate="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="google" content="notranslate" />
  <title>Адмінка — Wasteland King Defenders</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/auth-page.css" />
  <link rel="stylesheet" href="css/profile-page.css" />
  <link rel="stylesheet" href="css/admin-page.css" />
  <link rel="stylesheet" href="css/confirm-modal.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <script defer src="js/i18n.js"></script>
  <script defer src="js/i18n-uk.js"></script>
  <script defer src="js/i18n-en.js"></script>
  <script defer src="js/i18n-ru.js"></script>
  <script defer src="js/i18n-pl.js"></script>
  <script defer src="js/i18n-de.js"></script>
  <script defer src="js/i18n-ja.js"></script>
  <script defer src="js/i18n-zh.js"></script>
  <script defer src="js/i18n-ko.js"></script>
  <script defer src="js/i18n-vi.js"></script>
  <script defer src="js/i18n-ar.js"></script>
  <script defer src="js/core/dom.js"></script>
  <script defer src="js/core/partials.js"></script>
  <script defer src="js/header.js"></script>
  <script defer src="js/app-login-shell.js"></script>
  <script defer src="js/confirm-modal.js"></script>
  <script type="module" src="js/auth-google.js"></script>
  <script type="module" src="js/pages/admin-page.js"></script>
</head>
<body class="notranslate">
  <div data-include="partials/header.html"></div>

  <main class="profile-page container">
    <section class="profile-card admin-card">
      <div class="profile-head">
        <div>
          <p class="auth-eyebrow">Admin panel</p>
          <h2>Адмінка</h2>
          <p>Керуй заявками на ролі, переглядай зареєстрованих гравців і редагуй їхні дані з Firestore.</p>
        </div>
      </div>

      <div class="admin-status-row">
        <div class="admin-summary" id="adminSummary">Перевіряю доступ...</div>
        <div class="auth-status" id="adminStatus">Завантажую адмінку...</div>
      </div>

      <div class="admin-stats" id="adminStats">
        <div class="admin-stat-card"><span>Гравців</span><b>0</b></div>
        <div class="admin-stat-card"><span>Регіонів</span><b>0</b></div>
        <div class="admin-stat-card"><span>Керівних ролей</span><b>0</b></div>
        <div class="admin-stat-card"><span>Заявок</span><b>0</b></div>
      </div>

      <div class="admin-tabs" role="tablist" aria-label="Адмінка">
        <button class="admin-tab is-active" type="button" data-admin-tab="players">Зареєстровані гравці</button>
        <button class="admin-tab" type="button" data-admin-tab="requests">Заявки на ролі</button>
      </div>

      <section class="admin-section is-active" id="adminPlayersSection" data-admin-panel="players">
        <div class="admin-toolbar admin-toolbar--grid admin-toolbar--players">
          <label>
            <span>Нік</span>
            <input id="adminNickSearch" type="search" placeholder="Пошук по ніку" />
          </label>
          <label>
            <span>Альянс</span>
            <input id="adminAllianceSearch" type="search" placeholder="YYY" maxlength="8" />
          </label>
          <label>
            <span>Регіон</span>
            <input id="adminRegionSearch" type="search" inputmode="numeric" placeholder="987" />
          </label>
          <label>
            <span>Роль</span>
            <select id="adminRoleFilter">
              <option value="all">Усі</option>
              <option value="admin">Адмін</option>
              <option value="moderator">Модератор</option>
              <option value="consul">Консул</option>
              <option value="officer">Офіцер</option>
              <option value="player">Простий гравець</option>
            </select>
          </label>
          <label>
            <span>Рядків</span>
            <select id="adminRowsFilter">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
              <option value="all">Усі</option>
            </select>
          </label>
          <button class="btn btn-primary" id="refreshPlayersBtn" type="button">Оновити</button>
          <button class="btn" id="syncPublicPlayersBtn" type="button">Синхронізувати статистику</button>
        </div>

        <div class="admin-table-wrap">
          <table class="admin-table" id="registeredPlayersTable">
            <thead>
              <tr>
                <th><button type="button" data-sort="nickname">Нік ↓</button></th>
                <th><button type="button" data-sort="region">Регіон ↓</button></th>
                <th><button type="button" data-sort="alliance">Альянс ↓</button></th>
                <th><button type="button" data-sort="rank">Ранг ↓</button></th>
                <th><button type="button" data-sort="shk">ШК ↓</button></th>
                <th><button type="button" data-sort="role">Роль ↓</button></th>
                <th><button type="button" data-sort="createdAt">Дата реєстрації ↓</button></th>
                <th>Дії</th>
              </tr>
            </thead>
            <tbody id="registeredPlayersBody">
              <tr><td colspan="8">Завантажую гравців...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="admin-section" id="adminRequestsSection" data-admin-panel="requests">
        <div class="admin-toolbar">
          <button class="btn btn-primary" id="refreshRequestsBtn" type="button">Оновити заявки</button>
          <button class="btn" id="backToProfileBtn" type="button">Мій профіль</button>
        </div>
        <div class="admin-list" id="roleRequestsList">
          <div class="admin-empty">Заявок поки немає.</div>
        </div>
      </section>
    </section>
  </main>

  <div data-include="partials/confirm-modal.html"></div>
</body>
</html>
